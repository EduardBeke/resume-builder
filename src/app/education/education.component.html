<div class="flex gap-8 w-full">
  <p class="font-light w-40">
    <span> {{ education.from }}</span>
    @if (education.to) {
      <span> - {{ education.to }} </span>
    }
  </p>
  <div class="flex-1">
    <p class="font-bold" [innerHTML]="education.name"></p>
    @for (info of education.infos; track info) {
      <p class="font-light" [innerHTML]="info"></p>
    }
  </div>
</div>
